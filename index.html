<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Droply GPS</title>

  <!-- Mapbox GL JS v3 -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

  <!-- Mapbox Directions plugin -->
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.js"></script>
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-directions/v4.1.1/mapbox-gl-directions.css" />

  <!-- Mapbox Geocoder plugin v5 -->
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-brand">
        <div class="splash-logo-mark">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="22" stroke="var(--blue)" stroke-width="2.5"/>
            <circle cx="24" cy="24" r="8" fill="var(--blue)"/>
            <line x1="24" y1="2" x2="24" y2="12" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="24" y1="36" x2="24" y2="46" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="2" y1="24" x2="12" y2="24" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="36" y1="24" x2="46" y2="24" stroke="var(--blue)" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="splash-wordmark">DROPLY<span>GPS</span></div>
      </div>
      <div class="splash-progress">
        <div class="splash-progress-fill" id="splashBarFill"></div>
      </div>
      <p class="splash-status" id="splashStatus">Iniciando...</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <div id="map"></div>

    <header id="topbar">
      <div class="topbar-leading">
        <div class="topbar-brand">
          <span class="brand-dot"></span>
          <span class="brand-name">Droply</span>
        </div>
      </div>
      <div id="clock">00:00</div>
      <div class="topbar-actions">
        <div id="gps-badge" class="gps-badge searching">
          <span class="gps-dot"></span>
          <span id="gps-label">GPS</span>
        </div>
        <button class="icon-btn" id="btn-settings" title="Ajustes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <!-- SCREEN MAP -->
    <section class="screen screen-map active" data-screen="map">
      <div id="nav-pill" class="nav-pill hidden">
        <div class="nav-pill-arrow" id="nav-arrow">↑</div>
        <div class="nav-pill-info">
          <div id="nav-text" class="nav-pill-main">Introduce un destino</div>
          <div id="nav-dist" class="nav-pill-sub"></div>
        </div>
      </div>

      <div id="nav-panel" class="nav-panel hidden">
        <div class="nav-panel-left">
          <div class="nav-panel-title" id="nav-next-title">—</div>
          <div class="nav-panel-sub"><span id="nav-next-dist">—</span></div>
        </div>
        <div class="nav-panel-actions">
          <button class="nav-mini-btn" id="btn-steps">Lista</button>
          <button class="nav-mini-btn danger" id="btn-end-route">Fin</button>
        </div>
      </div>

      <div class="fab-group">
        <button class="fab" id="btn-center" title="Centrar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" stroke-dasharray="4 3"/></svg>
        </button>
        <button class="fab" id="btn-follow" title="Seguir">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>
        <button class="fab" id="btn-map-3d" title="3D">
          <span class="fab-label">3D</span>
        </button>
        <button class="fab" id="btn-traffic" title="Tráfico">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="2" width="12" height="20" rx="2"/><circle cx="12" cy="7" r="2" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="2" stroke="currentColor" fill="none"/><circle cx="12" cy="17" r="2" stroke="currentColor" fill="none"/></svg>
        </button>
      </div>

      <div id="style-switcher">
        <button class="style-btn active" data-style="navigation-day-v1">Día</button>
        <button class="style-btn" data-style="navigation-night-v1">Noche</button>
        <button class="style-btn" data-style="satellite-streets-v12">Satélite</button>
      </div>
    </section>

    <!-- SCREEN SEARCH -->
    <section class="screen screen-search" data-screen="search">
      <div class="panel">
        <div class="panel-header">
          <h2>Buscar destino</h2>
          <p>Escribe un lugar y pulsa <strong>Iniciar viaje</strong>.</p>
        </div>
        <div class="panel-body">
          <div id="geocoder"></div>
          <div class="search-actions">
            <button id="btn-start-route" class="start-btn">🚗 Iniciar viaje</button>
            <button class="primary-btn" id="btn-clear-route">Limpiar</button>
          </div>
        </div>
      </div>
    </section>

    <!-- GPS PROMPT -->
    <div id="gps-prompt" class="gps-prompt hidden">
      <div class="gps-prompt-icon">📍</div>
      <p class="gps-prompt-text">Activa la ubicación para empezar a navegar</p>
      <button class="gps-prompt-btn" id="btn-request-gps">Activar GPS</button>
    </div>

    <!-- STATUS BAR -->
    <footer id="statusbar">
      <div class="status-item">
        <div class="status-val" id="speed-val">0</div>
        <div class="status-label">km/h</div>
      </div>
      <div class="status-divider"></div>
      <div class="status-item">
        <div class="status-val" id="dist-val">—</div>
        <div class="status-label">km</div>
      </div>
      <div class="status-divider"></div>
      <div class="status-item">
        <div class="status-val" id="eta-val">—</div>
        <div class="status-label">min</div>
      </div>
    </footer>

    <!-- BOTTOM NAV -->
    <nav id="bottomnav">
      <button class="nav-btn active" data-go="map">Mapa</button>
      <button class="nav-btn" data-go="search">Buscar</button>
      <button class="nav-btn" data-go="settings" id="btn-open-settings">Ajustes</button>
    </nav>

    <div id="toast-container"></div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop" id="close-settings-backdrop"></div>
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <h2>Ajustes</h2>
          <button class="modal-close" id="close-settings">✕</button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label class="setting-label">Unidades</label>
            <div class="segment-control">
              <button class="segment active" data-val="metric" data-setting="units">Kilómetros</button>
              <button class="segment" data-val="imperial" data-setting="units">Millas</button>
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Evitar peajes</label>
            <label class="toggle-switch"><input type="checkbox" id="avoid-tolls-toggle"/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Evitar autopistas</label>
            <label class="toggle-switch"><input type="checkbox" id="avoid-motorways-toggle"/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Evitar ferries</label>
            <label class="toggle-switch"><input type="checkbox" id="avoid-ferries-toggle"/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Perfil</label>
            <select id="profile-select" class="setting-select">
              <option value="mapbox/driving-traffic">Coche (tráfico)</option>
              <option value="mapbox/driving">Coche</option>
              <option value="mapbox/cycling">Bicicleta</option>
              <option value="mapbox/walking">A pie</option>
            </select>
          </div>
          <div class="setting-group">
            <label class="setting-label">Aviso exceso velocidad</label>
            <label class="toggle-switch"><input type="checkbox" id="overspeed-toggle" checked/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Límite (km/h)</label>
            <input type="number" id="speed-limit-input" class="setting-input" min="10" max="200" step="5" value="120"/>
          </div>
          <div class="setting-group">
            <label class="setting-label">Modo HUD</label>
            <label class="toggle-switch"><input type="checkbox" id="hud-toggle"/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Avisos de voz</label>
            <label class="toggle-switch"><input type="checkbox" id="voice-toggle" checked/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Autocentrar mapa</label>
            <label class="toggle-switch"><input type="checkbox" id="autocenter-toggle" checked/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Velocímetro</label>
            <label class="toggle-switch"><input type="checkbox" id="speedometer-toggle" checked/><span class="toggle-track"><span class="toggle-thumb"></span></span></label>
          </div>
          <div class="setting-group">
            <label class="setting-label">Token Mapbox</label>
            <input type="text" id="token-input" class="setting-input" placeholder="pk.eyJ1..."/>
          </div>
          <button class="save-btn" id="btn-save-settings">Guardar ajustes</button>
        </div>
      </div>
    </div>

    <!-- STEPS MODAL -->
    <div id="steps-modal" class="modal hidden">
      <div class="modal-backdrop" id="close-steps-backdrop"></div>
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
          <h2>Instrucciones</h2>
          <button class="modal-close" id="close-steps">✕</button>
        </div>
        <div class="modal-body">
          <ol class="steps-list" id="steps-list"></ol>
        </div>
      </div>
    </div>

  </div><!-- /app -->

  <script src="app.js"></script>
</body>
</html>
